name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.10.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: apps/bares3-server/go.mod

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build embedded web UI
        run: pnpm build:webui

      - name: Run Go tests
        working-directory: apps/bares3-server
        run: go test ./...

      - name: Validate server build
        working-directory: apps/bares3-server
        run: go build ./cmd/bares3d
