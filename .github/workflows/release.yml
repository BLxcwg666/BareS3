name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.10.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: apps/bares3-server/go.mod

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build embedded web UI
        run: pnpm build:webui

      - name: Build release archives
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${GITHUB_REF_NAME}"
          APP_VERSION="${VERSION#v}"
          COMMIT="${GITHUB_SHA::7}"
          BUILT_AT="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"

          mkdir -p release

          targets=(
            "linux amd64 tar.gz"
            "linux arm64 tar.gz"
            "darwin amd64 tar.gz"
            "darwin arm64 tar.gz"
            "windows amd64 zip"
          )

          for target in "${targets[@]}"; do
            read -r GOOS GOARCH ARCHIVE_EXT <<<"${target}"

            ASSET_NAME="bares3-${VERSION}-${GOOS}-${GOARCH}"
            STAGE_DIR="release/${ASSET_NAME}"
            BINARY_NAME="bares3d"

            if [[ "${GOOS}" == "windows" ]]; then
              BINARY_NAME="${BINARY_NAME}.exe"
            fi

            mkdir -p "${STAGE_DIR}"
            cp README.md "${STAGE_DIR}/README.md"
            cp apps/bares3-server/config.yml "${STAGE_DIR}/config.example.yml"

            (
              cd apps/bares3-server
              CGO_ENABLED=0 GOOS="${GOOS}" GOARCH="${GOARCH}" \
                go build \
                -trimpath \
                -ldflags="-s -w -X bares3-server/internal/buildinfo.Version=${APP_VERSION} -X bares3-server/internal/buildinfo.Commit=${COMMIT} -X bares3-server/internal/buildinfo.BuiltAt=${BUILT_AT}" \
                -o "../../${STAGE_DIR}/${BINARY_NAME}" \
                ./cmd/bares3d
            )

            if [[ "${ARCHIVE_EXT}" == "zip" ]]; then
              (
                cd release
                python -m zipfile -c "${ASSET_NAME}.zip" "${ASSET_NAME}"
              )
              rm -rf "${STAGE_DIR}"
            else
              tar -C release -czf "release/${ASSET_NAME}.tar.gz" "${ASSET_NAME}"
              rm -rf "${STAGE_DIR}"
            fi
          done

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*
