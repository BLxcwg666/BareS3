app:
  env: development

paths:
  data_dir: ./data
  log_dir: ./logs

listen:
  admin: 127.0.0.1:19080
  s3: 0.0.0.0:9000
  file: 0.0.0.0:9001

auth:
  console:
    username: admin
    password_hash: ""
    session_secret: ""
    session_ttl_minutes: 10080
  s3:
    access_key_id: bares3-dev
    secret_access_key: bares3-dev-secret

storage:
  public_base_url: http://127.0.0.1:9001
  s3_base_url: http://127.0.0.1:9000
  region: home-lab-1
  tmp_dir: ./data/.bares3/tmp
  metadata_layout: hidden-dir
  max_bytes: 0

logging:
  level: info
  format: pretty
  rotate_size_mb: 16
  rotate_keep: 10
