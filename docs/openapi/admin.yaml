components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: bares3_admin_session
  parameters:
    BucketName:
      name: bucket
      in: path
      required: true
      schema:
        type: string
      description: bucket 名称
    ObjectKey:
      name: key
      in: path
      required: true
      schema:
        type: string
      description: |
        对象 key。

        这个路径参数在实际路由里是 wildcard remainder，也就是说可以包含 `/`。
        生成客户端时要注意路径拼接和 URL 编码。
    UploadId:
      name: uploadID
      in: path
      required: true
      schema:
        type: string
    PartNumber:
      name: partNumber
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    AccessKeyId:
      name: accessKeyID
      in: path
      required: true
      schema:
        type: string
    ShareLinkId:
      name: id
      in: path
      required: true
      schema:
        type: string
    ReplicationTokenId:
      name: id
      in: path
      required: true
      schema:
        type: string
    RemoteId:
      name: id
      in: path
      required: true
      schema:
        type: string
  examples:
    InvalidRequestBody:
      summary: 请求体不是合法 JSON
      value:
        status: error
        message: invalid request body
    InvalidCredentials:
      summary: 用户名或密码错误
      value:
        status: error
        message: invalid credentials
    NotAuthenticated:
      summary: 当前未登录
      value:
        status: error
        message: not authenticated
    SameOriginRejected:
      summary: 同源校验失败
      value:
        status: error
        message: request origin does not match admin host
    InvalidBucketName:
      summary: bucket 名称不合法
      value:
        status: error
        message: invalid bucket name
    BucketAlreadyExists:
      summary: bucket 已存在
      value:
        status: error
        message: bucket already exists
    BucketNotFound:
      summary: bucket 不存在
      value:
        status: error
        message: bucket not found
    BucketNotEmpty:
      summary: bucket 非空
      value:
        status: error
        message: bucket not empty
    InvalidBucketAccess:
      summary: bucket 访问规则不合法
      value:
        status: error
        message: 'invalid bucket access: action must be public, authenticated, or deny'
    InvalidObjectKey:
      summary: object key 不合法
      value:
        status: error
        message: invalid object key
    ObjectNotFound:
      summary: 对象不存在
      value:
        status: error
        message: object not found
    ObjectSyncing:
      summary: 对象仍在同步中
      value:
        status: error
        message: object syncing
    QuotaExceeded:
      summary: quota 超限
      value:
        status: error
        message: bucket quota exceeded
    InvalidMultipartForm:
      summary: multipart 表单不合法
      value:
        status: error
        message: invalid multipart form
    UploadNotFound:
      summary: multipart upload 不存在
      value:
        status: error
        message: multipart upload not found
    InvalidPartNumber:
      summary: part 编号不合法
      value:
        status: error
        message: invalid multipart part number
    InvalidMove:
      summary: 移动参数不合法
      value:
        status: error
        message: invalid move
    InvalidDomainBindings:
      summary: 域名绑定不合法
      value:
        status: error
        message: settings.domain_bindings[1].host duplicates settings.domain_bindings[0].host
    InvalidPermission:
      summary: S3 权限值不合法
      value:
        status: error
        message: invalid permission
    CredentialNotFound:
      summary: S3 凭据不存在
      value:
        status: error
        message: credential not found
    CredentialActiveConflict:
      summary: 凭据仍处于 active 状态
      value:
        status: error
        message: credential is still active
    NoActiveCredential:
      summary: 没有可用的活动凭据
      value:
        status: error
        message: no active credential available for requested operation
    ShareLinkNotFound:
      summary: 分享链接不存在
      value:
        status: error
        message: share link not found
    ShareLinkInvalidId:
      summary: 分享链接 ID 不合法
      value:
        status: error
        message: invalid share link id
    ShareLinkNotRevoked:
      summary: 分享链接未先吊销
      value:
        status: error
        message: share link must be revoked before removal
    SyncConflictNotFound:
      summary: 未找到需要重拉的冲突对象
      value:
        status: error
        message: object sync status not found
    ReplicationTokenNotFound:
      summary: 同步令牌不存在
      value:
        status: error
        message: token not found
    ReplicationTokenActive:
      summary: 同步令牌仍处于 active 状态
      value:
        status: error
        message: token is still active
    RemoteNotFound:
      summary: 同步远端不存在
      value:
        status: error
        message: remote not found
    RemoteProbeFailed:
      summary: 远端探测失败
      value:
        status: error
        message: invalid sync credentials
    InvalidQueryLimit:
      summary: 查询参数不合法
      value:
        status: error
        message: limit must be between 0 and 50
  schemas:
    ErrorResponse:
      type: object
      required: [status, message]
      properties:
        status:
          type: string
          example: error
        message:
          type: string
      example:
        status: error
        message: bucket not found
    StatusOkResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: ok
      example:
        status: ok
    BuildInfo:
      type: object
      required: [product, version, commit, built_at, go_version]
      properties:
        product:
          type: string
        version:
          type: string
        commit:
          type: string
        built_at:
          type: string
        go_version:
          type: string
      example:
        product: BareS3
        version: 1.2.2
        commit: abcdef1
        built_at: '2026-04-13T12:00:00Z'
        go_version: go1.25.0
    HealthResponse:
      type: object
      required: [status, service, version, time]
      properties:
        status:
          type: string
        service:
          type: string
        version:
          $ref: '#/components/schemas/BuildInfo'
        time:
          type: string
          format: date-time
        region:
          type: string
      example:
        status: ok
        service: admin
        region: us-east-1
        version:
          product: BareS3
          version: 1.2.2
          commit: abcdef1
          built_at: '2026-04-13T12:00:00Z'
          go_version: go1.25.0
        time: '2026-04-13T12:34:56Z'
    ReadyResponse:
      type: object
      required: [status, service, checks, time]
      properties:
        status:
          type: string
          enum: [ok, error]
        service:
          type: string
        checks:
          type: object
          additionalProperties:
            type: string
        time:
          type: string
          format: date-time
      example:
        status: ok
        service: admin
        checks:
          storage: ok
          auditlog: ok
          webui: ok
        time: '2026-04-13T12:34:56Z'
    AuthLoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string
          format: password
      example:
        username: admin
        password: your-password
    AuthSession:
      type: object
      required: [username, expires_at]
      properties:
        username:
          type: string
        expires_at:
          type: string
          format: date-time
      example:
        username: admin
        expires_at: '2026-04-20T12:34:56Z'
    SearchResultItem:
      type: object
      required: [kind, bucket]
      properties:
        kind:
          type: string
          enum: [bucket, object]
        bucket:
          type: string
        key:
          type: string
    SearchResultsResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/SearchResultItem'
      example:
        items:
          - kind: bucket
            bucket: gallery
          - kind: object
            bucket: gallery
            key: notes/readme.txt
    AuditEntry:
      type: object
      required: [time, actor, action, title]
      properties:
        time:
          type: string
          format: date-time
        actor:
          type: string
        action:
          type: string
        title:
          type: string
        detail:
          type: string
        target:
          type: string
        remote:
          type: string
        status:
          type: string
    AuditEventsResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/AuditEntry'
      example:
        items:
          - time: '2026-04-13T12:30:00Z'
            actor: admin
            action: bucket.create
            title: Created bucket gallery
            detail: Access private
            target: gallery
            remote: 127.0.0.1
            status: success
    RuntimeSnapshot:
      type: object
      required: [app, version, config, paths, listen, storage, sync]
      properties:
        app:
          type: object
          required: [name, env]
          properties:
            name:
              type: string
            env:
              type: string
        version:
          $ref: '#/components/schemas/BuildInfo'
        config:
          type: object
          required: [path, used, base]
          properties:
            path:
              type: string
            used:
              type: string
            base:
              type: string
        paths:
          type: object
          required: [data_dir, log_dir, tmp_dir]
          properties:
            data_dir:
              type: string
            log_dir:
              type: string
            tmp_dir:
              type: string
        listen:
          type: object
          required: [admin, s3, file]
          properties:
            admin:
              type: string
            s3:
              type: string
            file:
              type: string
        storage:
          type: object
          required:
            [region, public_base_url, s3_base_url, metadata_layout, domain_bindings, max_bytes, used_bytes, bucket_count, active_link_count]
          properties:
            region:
              type: string
            public_base_url:
              type: string
            s3_base_url:
              type: string
            metadata_layout:
              type: string
            domain_bindings:
              type: array
              items:
                $ref: '#/components/schemas/DomainBinding'
            max_bytes:
              type: integer
              format: int64
            used_bytes:
              type: integer
              format: int64
            bucket_count:
              type: integer
            active_link_count:
              type: integer
        sync:
          type: object
          required: [enabled]
          properties:
            enabled:
              type: boolean
      example:
        app:
          name: BareS3
          env: production
        version:
          product: BareS3
          version: 1.2.2
          commit: abcdef1
          built_at: '2026-04-13T12:00:00Z'
          go_version: go1.25.0
        config:
          path: /etc/bares3/config.yml
          used: explicit
          base: /etc/bares3
        paths:
          data_dir: /var/lib/bares3/data
          log_dir: /var/log/bares3
          tmp_dir: /var/lib/bares3/tmp
        listen:
          admin: 127.0.0.1:19080
          s3: 0.0.0.0:9000
          file: 0.0.0.0:9001
        storage:
          region: us-east-1
          public_base_url: https://files.example.com
          s3_base_url: https://s3.example.com
          metadata_layout: hidden-dir
          domain_bindings:
            - host: cdn.example.com
              bucket: gallery
              prefix: site
              index_document: true
              spa_fallback: true
          max_bytes: 0
          used_bytes: 123456
          bucket_count: 2
          active_link_count: 1
        sync:
          enabled: true
    BucketInfo:
      type: object
      required:
        [name, path, metadata_path, created_at, metadata_layout, access_mode, replication_enabled, used_bytes, object_count]
