            metadata_path: /var/lib/bares3/data/gallery/.bares3
            created_at: '2026-04-13T12:00:00Z'
            metadata_layout: hidden-dir
            access_mode: private
            replication_enabled: true
            quota_bytes: 0
            tags: [prod]
            note: main image bucket
            used_bytes: 123456
            object_count: 42
    CreateBucketRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        access_mode:
          type: string
          enum: [private, public, custom]
        replication_enabled:
          type: boolean
        quota_bytes:
          type: integer
          format: int64
      example:
        name: gallery
        access_mode: private
        replication_enabled: true
        quota_bytes: 0
    UpdateBucketRequest:
      type: object
      required: [name, access_mode, replication_enabled, quota_bytes]
      properties:
        name:
          type: string
        access_mode:
          type: string
          enum: [private, public, custom]
        replication_enabled:
          type: boolean
        quota_bytes:
          type: integer
          format: int64
        tags:
          type: array
          items:
            type: string
        note:
          type: string
