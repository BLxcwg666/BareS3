openapi: 3.0.3
info:
  title: BareS3 Admin API
  version: 1.2.2
  description: |
    BareS3 管理后台 JSON API 的 OpenAPI 规范

    这份规范只覆盖 admin 服务上的 JSON API，也就是 `/api/v1/*` 以及少量 admin 侧基础接口
servers:
  - url: http://127.0.0.1:19080
    description: 默认本地管理端监听地址
tags:
  - name: Health
  - name: Auth
  - name: Observability
  - name: Buckets
  - name: Objects
  - name: Browser
  - name: Settings
  - name: Credentials
  - name: ShareLinks
  - name: Sync
  - name: Replication
paths:
  /healthz:
    get:
      tags: [Health]
      summary: 管理端健康检查
      operationId: adminHealthz
      responses:
        '200':
          description: 健康
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              examples:
                adminHealthy:
                  summary: 管理端健康
                  value:
                    status: ok
                    service: admin
                    region: us-east-1
                    version:
                      product: BareS3
                      version: 1.2.2
                      commit: abcdef1
                      built_at: '2026-04-13T12:00:00Z'
                      go_version: go1.25.0
                    time: '2026-04-13T12:34:56Z'
  /readyz:
    get:
      tags: [Health]
      summary: 管理端就绪检查
      operationId: adminReadyz
      responses:
        '200':
          description: 就绪
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadyResponse'
              examples:
                ready:
                  summary: 服务已就绪
                  value:
                    status: ok
                    service: admin
                    checks:
                      storage: ok
                      auditlog: ok
                      webui: ok
                    time: '2026-04-13T12:34:56Z'
        '503':
          description: 未就绪
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadyResponse'
              examples:
                notReady:
                  summary: 服务未就绪
                  value:
                    status: error
                    service: admin
                    checks:
                      storage: ok
                      webui: missing embedded assets
                    time: '2026-04-13T12:34:56Z'
  /metrics:
    get:
      tags: [Health]
      summary: Prometheus 指标
      operationId: adminMetrics
      responses:
        '200':
          description: 指标文本
          content:
            text/plain:
              schema:
                type: string
              examples:
                metricsSample:
                  summary: Prometheus 指标片段
                  value: |
                    # HELP bares3_http_requests_total Total HTTP requests
                    # TYPE bares3_http_requests_total counter
                    bares3_http_requests_total{service="admin",method="GET",route="/api/v1/runtime",code="200"} 12
  /api/v1/health:
    get:
      tags: [Health]
      summary: 管理 API 健康检查
      operationId: adminApiHealth
      responses:
        '200':
          description: 健康
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              examples:
                adminApiHealthy:
                  summary: API 健康检查
                  value:
                    status: ok
                    service: admin
                    region: us-east-1
                    version:
                      product: BareS3
                      version: 1.2.2
                      commit: abcdef1
                      built_at: '2026-04-13T12:00:00Z'
                      go_version: go1.25.0
                    time: '2026-04-13T12:34:56Z'
  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: 登录后台
      operationId: loginAdmin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthLoginRequest'
      responses:
        '200':
          description: 登录成功
          headers:
            Set-Cookie:
              schema:
                type: string
              description: "`bares3_admin_session` 会话 Cookie"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSession'
        '400':
          description: 请求体不合法
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidRequestBody:
                  $ref: '#/components/examples/InvalidRequestBody'
        '401':
          description: 用户名或密码错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidCredentials:
                  $ref: '#/components/examples/InvalidCredentials'
  /api/v1/auth/me:
    get:
      tags: [Auth]
      summary: 获取当前会话
      operationId: getCurrentAdminSession
      security:
        - cookieAuth: []
      responses:
        '200':
          description: 当前会话
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSession'
              examples:
                currentSession:
                  summary: 已登录会话
                  value:
                    username: admin
                    expires_at: '2026-04-20T12:34:56Z'
        '401':
          description: 未登录
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                notAuthenticated:
                  $ref: '#/components/examples/NotAuthenticated'
  /api/v1/auth/logout:
    get:
      tags: [Auth]
      summary: 登出
      description: 需要满足同源校验。
      operationId: logoutAdminGet
      responses:
        '204':
          description: 已登出
        '403':
          description: 同源校验失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                sameOriginRejected:
                  $ref: '#/components/examples/SameOriginRejected'
    post:
      tags: [Auth]
      summary: 登出
      description: 需要满足同源校验。
      operationId: logoutAdminPost
      responses:
        '204':
          description: 已登出
        '403':
          description: 同源校验失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                sameOriginRejected:
                  $ref: '#/components/examples/SameOriginRejected'
  /api/v1/search:
    get:
      tags: [Observability]
      summary: 搜索 bucket 和对象
      operationId: searchBucketsAndObjects
      security:
        - cookieAuth: []
      parameters:
        - name: query
          in: query
          schema:
            type: string
          description: 搜索关键字
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 0
            maximum: 50
            default: 12
      responses:
        '200':
          description: 搜索结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResultsResponse'
              examples:
                mixedSearchResults:
                  summary: 同时命中 bucket 和 object
                  value:
                    items:
                      - kind: bucket
                        bucket: gallery
                      - kind: object
                        bucket: gallery
                        key: notes/readme.txt
        '400':
          description: 参数不合法
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidQueryLimit:
                  $ref: '#/components/examples/InvalidQueryLimit'
  /api/v1/audit/events:
    get:
      tags: [Observability]
      summary: 获取最近审计事件
      operationId: listAuditEvents
      security:
        - cookieAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 0
            default: 10
      responses:
        '200':
          description: 审计事件
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditEventsResponse'
              examples:
                latestAuditEvents:
                  summary: 最近几条审计事件
                  value:
                    items:
                      - time: '2026-04-13T12:30:00Z'
                        actor: admin
                        action: bucket.create
                        title: Created bucket gallery
                        detail: Access private
                        target: gallery
                        remote: 127.0.0.1
                        status: success
                      - time: '2026-04-13T12:31:00Z'
                        actor: admin
                        action: object.upload
                        title: Uploaded notes/readme.txt
                        detail: Bucket gallery
                        target: gallery/notes/readme.txt
                        remote: 127.0.0.1
                        status: success
        '400':
          description: 参数不合法
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidQueryLimit:
                  $ref: '#/components/examples/InvalidQueryLimit'
  /api/v1/runtime:
    get:
      tags: [Observability]
      summary: 获取运行时快照
      operationId: getRuntimeSnapshot
      security:
        - cookieAuth: []
      responses:
        '200':
          description: 运行时快照
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuntimeSnapshot'
              examples:
                productionRuntime:
                  summary: 正式环境运行时快照
                  value:
                    app:
                      name: BareS3
                      env: production
                    version:
                      product: BareS3
                      version: 1.2.2
                      commit: abcdef1
                      built_at: '2026-04-13T12:00:00Z'
                      go_version: go1.25.0
                    config:
                      path: /etc/bares3/config.yml
                      used: explicit
                      base: /etc/bares3
                    paths:
                      data_dir: /var/lib/bares3/data
                      log_dir: /var/log/bares3
                      tmp_dir: /var/lib/bares3/tmp
                    listen:
                      admin: 127.0.0.1:19080
                      s3: 0.0.0.0:9000
                      file: 0.0.0.0:9001
                    storage:
                      region: us-east-1
                      public_base_url: https://files.example.com
                      s3_base_url: https://s3.example.com
                      metadata_layout: hidden-dir
                      domain_bindings:
                        - host: cdn.example.com
                          bucket: public-assets
                          prefix: assets
                          index_document: false
                          spa_fallback: false
                      max_bytes: 0
                      used_bytes: 123456
                      bucket_count: 2
                      active_link_count: 1
                    sync:
                      enabled: true
  /api/v1/buckets:
    get:
      tags: [Buckets]
      summary: 列出 bucket
      operationId: listBuckets
      security:
        - cookieAuth: []
      responses:
        '200':
          description: bucket 列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BucketListResponse'
              examples:
                mixedBuckets:
                  summary: 多个 bucket 的典型列表
                  value:
                    items:
                      - name: gallery
                        path: /var/lib/bares3/data/gallery
                        metadata_path: /var/lib/bares3/data/gallery/.bares3
                        created_at: '2026-04-13T12:00:00Z'
                        metadata_layout: hidden-dir
                        access_mode: private
                        replication_enabled: true
                        quota_bytes: 0
                        tags: [prod, images]
                        note: main image bucket
                        used_bytes: 123456
                        object_count: 42
                      - name: public-assets
                        path: /var/lib/bares3/data/public-assets
                        metadata_path: /var/lib/bares3/data/public-assets/.bares3
                        created_at: '2026-04-13T13:00:00Z'
                        metadata_layout: hidden-dir
                        access_mode: public
                        replication_enabled: false
                        quota_bytes: 0
                        tags: [cdn]
                        note: public static assets
                        used_bytes: 20480
                        object_count: 7
    post:
      tags: [Buckets]
      summary: 创建 bucket
      description: 需要已登录且满足同源校验。
      operationId: createBucket
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBucketRequest'
            examples:
              privateBucket:
                summary: 私有 bucket
                value:
                  name: gallery
                  access_mode: private
                  replication_enabled: true
                  quota_bytes: 0
              publicBucket:
                summary: 公开 bucket
                value:
                  name: public-assets
                  access_mode: public
                  replication_enabled: false
                  quota_bytes: 0
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BucketInfo'
              examples:
                createdBucket:
                  summary: 创建后的 bucket
                  value:
                    name: gallery
                    path: /var/lib/bares3/data/gallery
                    metadata_path: /var/lib/bares3/data/gallery/.bares3
                    created_at: '2026-04-13T12:00:00Z'
                    metadata_layout: hidden-dir
                    access_mode: private
                    replication_enabled: true
                    quota_bytes: 0
                    tags: []
                    note: ''
                    used_bytes: 0
                    object_count: 0
        '400':
          description: 请求体或 bucket 参数不合法
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidBucketName:
                  $ref: '#/components/examples/InvalidBucketName'
                invalidRequestBody:
                  $ref: '#/components/examples/InvalidRequestBody'
        '409':
          description: bucket 已存在或 quota 冲突
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                bucketAlreadyExists:
                  $ref: '#/components/examples/BucketAlreadyExists'
                quotaExceeded:
                  $ref: '#/components/examples/QuotaExceeded'
  /api/v1/buckets/{bucket}:
    parameters:
      - $ref: '#/components/parameters/BucketName'
    get:
      tags: [Buckets]
      summary: 获取单个 bucket
      operationId: getBucket
      security:
        - cookieAuth: []
      responses:
        '200':
          description: bucket 信息
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BucketInfo'
              examples:
                privateBucket:
                  summary: 私有 bucket 详情
                  value:
                    name: gallery
                    path: /var/lib/bares3/data/gallery
                    metadata_path: /var/lib/bares3/data/gallery/.bares3
                    created_at: '2026-04-13T12:00:00Z'
                    metadata_layout: hidden-dir
                    access_mode: private
                    replication_enabled: true
                    quota_bytes: 0
                    tags: [prod, images]
                    note: main image bucket
                    used_bytes: 123456
                    object_count: 42
        '404':
          description: bucket 不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                bucketNotFound:
                  $ref: '#/components/examples/BucketNotFound'
    put:
      tags: [Buckets]
      summary: 更新 bucket
      operationId: updateBucket
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateBucketRequest'
            examples:
              renameAndTag:
                summary: 重命名并补标签
                value:
                  name: gallery-2026
                  access_mode: private
                  replication_enabled: true
                  quota_bytes: 0
                  tags:
                    - prod
                    - images
                  note: renamed for 2026 rollout
              switchToPublic:
                summary: 切成公开 bucket
                value:
                  name: public-assets
                  access_mode: public
                  replication_enabled: false
                  quota_bytes: 0
                  tags:
                    - cdn
                  note: public web assets
      responses:
        '200':
          description: 更新后的 bucket
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BucketInfo'
              examples:
                updatedBucket:
                  summary: 更新后的 bucket
                  value:
                    name: gallery-2026
                    path: /var/lib/bares3/data/gallery-2026
                    metadata_path: /var/lib/bares3/data/gallery-2026/.bares3
                    created_at: '2026-04-13T12:00:00Z'
                    metadata_layout: hidden-dir
                    access_mode: private
                    replication_enabled: true
                    quota_bytes: 0
                    tags: [prod, images]
                    note: renamed for 2026 rollout
                    used_bytes: 123456
                    object_count: 42
        '400':
          description: 请求体或参数不合法
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidBucketName:
                  $ref: '#/components/examples/InvalidBucketName'
                invalidRequestBody:
                  $ref: '#/components/examples/InvalidRequestBody'
        '404':
          description: bucket 不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                bucketNotFound:
                  $ref: '#/components/examples/BucketNotFound'
        '409':
          description: 冲突
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                bucketAlreadyExists:
                  $ref: '#/components/examples/BucketAlreadyExists'
                quotaExceeded:
                  $ref: '#/components/examples/QuotaExceeded'
    delete:
      tags: [Buckets]
      summary: 删除 bucket
      operationId: deleteBucket
      security:
        - cookieAuth: []
      responses:
        '204':
          description: 删除成功
        '404':
          description: bucket 不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                bucketNotFound:
                  $ref: '#/components/examples/BucketNotFound'
        '409':
          description: bucket 非空等冲突
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                bucketNotEmpty:
                  $ref: '#/components/examples/BucketNotEmpty'
  /api/v1/buckets/{bucket}/history:
    parameters:
      - $ref: '#/components/parameters/BucketName'
    get:
      tags: [Buckets]
      summary: 获取 bucket 使用量历史
      operationId: listBucketHistory
      security:
        - cookieAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 0
            default: 24
      responses:
        '200':
          description: 历史数据
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BucketHistoryResponse'
              examples:
                hourlyUsage:
                  summary: 按小时的 bucket 使用量
                  value:
                    items:
                      - recorded_at: '2026-04-13T10:00:00Z'
                        used_bytes: 120000
                        object_count: 40
                        quota_bytes: 0
                      - recorded_at: '2026-04-13T11:00:00Z'
                        used_bytes: 123456
                        object_count: 42
                        quota_bytes: 0
        '400':
          description: 参数不合法
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidQueryLimit:
                  $ref: '#/components/examples/InvalidQueryLimit'
        '404':
          description: bucket 不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                bucketNotFound:
                  $ref: '#/components/examples/BucketNotFound'
  /api/v1/buckets/{bucket}/access:
    parameters:
      - $ref: '#/components/parameters/BucketName'
    get:
      tags: [Buckets]
      summary: 获取 bucket 访问配置
      operationId: getBucketAccess
      security:
        - cookieAuth: []
      responses:
        '200':
          description: 访问配置
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BucketAccessConfig'
              examples:
                customAccess:
                  summary: 自定义访问规则
                  value:
                    mode: custom
                    policy:
                      default_action: authenticated
                      rules:
                        - prefix: images/
                          action: public
                          note: static assets
                        - prefix: secret/
                          action: deny
        '404':
          description: bucket 不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                bucketNotFound:
                  $ref: '#/components/examples/BucketNotFound'
    put:
      tags: [Buckets]
      summary: 更新 bucket 访问配置
      operationId: updateBucketAccess
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateBucketAccessRequest'
            examples:
              makeEverythingPublic:
                summary: 整桶公开
                value:
                  mode: public
                  policy:
                    default_action: public
                    rules: []
              customPrefixRules:
                summary: 前缀级规则
                value:
                  mode: custom
                  policy:
                    default_action: authenticated
                    rules:
                      - prefix: images/
                        action: public
                        note: static assets
                      - prefix: secret/
                        action: deny
      responses:
        '200':
          description: 更新后的访问配置
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BucketAccessConfig'
              examples:
                updatedCustomAccess:
                  summary: 更新后的访问配置
                  value:
                    mode: custom
                    policy:
                      default_action: authenticated
                      rules:
                        - prefix: images/
                          action: public
                          note: static assets
                        - prefix: secret/
                          action: deny
        '400':
          description: 请求体或访问规则不合法
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidBucketAccess:
                  $ref: '#/components/examples/InvalidBucketAccess'
                invalidRequestBody:
                  $ref: '#/components/examples/InvalidRequestBody'
        '404':
          description: bucket 不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                bucketNotFound:
                  $ref: '#/components/examples/BucketNotFound'
  /api/v1/buckets/{bucket}/objects:
    parameters:
      - $ref: '#/components/parameters/BucketName'
    get:
      tags: [Objects]
      summary: 分页列出对象
      operationId: listObjectsPage
      security:
        - cookieAuth: []
      parameters:
        - name: prefix
          in: query
          schema:
            type: string
        - name: query
          in: query
          schema:
            type: string
        - name: cursor
          in: query
          schema:
            type: string
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 0
        - name: delimiter
          in: query
          schema:
            type: string
      responses:
        '200':
          description: 分页结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ObjectListResponse'
              examples:
                objectPage:
                  summary: 同时返回对象和 prefixes
                  value:
                    items:
                      - bucket: gallery
                        key: notes/readme.txt
                        path: /var/lib/bares3/data/gallery/notes/readme.txt
                        metadata_path: /var/lib/bares3/data/gallery/.bares3
                        size: 1024
                        etag: 6b1c01703b68cf9b35ab049385900b5f
                        checksum_sha256: 0a1b2c3d4e5f
                        revision: 12
                        origin_node_id: node-a
                        last_change_id: chg_01JQTEST
                        content_type: text/plain; charset=utf-8
                        cache_control: public, max-age=3600
                        content_disposition: inline
                        user_metadata:
                          author: xcnya
                        last_modified: '2026-04-13T12:00:00Z'
                    prefixes:
                      - notes/
                      - uploads/
                    total_count: 1
                    has_more: false
                    next_cursor: notes/readme.txt
        '400':
          description: 参数不合法
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidQueryLimit:
                  $ref: '#/components/examples/InvalidQueryLimit'
        '404':
          description: bucket 不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                bucketNotFound:
                  $ref: '#/components/examples/BucketNotFound'
    post:
      tags: [Objects]
      summary: 上传单个对象
      description: |
        走 `multipart/form-data`。

